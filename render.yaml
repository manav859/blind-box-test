services:
  - type: web
    name: blindbox-backend
    runtime: node
    rootDir: app
    buildCommand: npm install && npm run build
    startCommand: node dist/index.js
    healthCheckPath: /health
    # Free tier spins down after ~15 min idle; the in-process keep-alive self-ping
    # (src/index.ts, every 13 min) keeps the instance warm to avoid cold starts.
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: SHOPLINE_APP_URL
        sync: false
      - key: SHOPLINE_APP_KEY
        sync: false
      - key: SHOPLINE_APP_SECRET
        sync: false
      - key: SCOPES
        sync: false
      - key: SHOPLINE_ADMIN_API_VERSION
        sync: false
      - key: BLIND_BOX_SHOPLINE_LOCATION_ID
        sync: false
      - key: BLIND_BOX_INVENTORY_EXECUTION_MODE
        value: execute
      - key: LOG_LEVEL
        value: info
